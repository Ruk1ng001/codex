# 可复用打包工作流：把「编译产出的 cx 二进制 + 成品配置」打成 macOS 原生 .pkg 安装包（US-017）。
#
# 定位（US-017 验收 1/4）：
#   - 这是一个 workflow_call 可复用工作流——把原先内联在 release.yml 的 macOS 打包逻辑抽出来，
#     供发布流程（release.yml）以 `uses:` 复用，也可被将来任何流程复用。
#   - 打包脚本集中在 packaging/macos/（build-pkg.sh + scripts/postinstall），本工作流只做
#     「取二进制 → 渲染成品配置 → 调打包脚本 → 守卫 → 上传」的编排，具体打包实现全在 packaging/。
#
# 输入 / 输出：
#   - 输入：编译产出的平台二进制（download 名 = binary-artifact）+ US-016 的成品配置
#           （由 render-config.sh 用 Secret 渲染）；
#   - 输出：该平台原生安装包 .pkg，作为 artifact（名 = pkg-artifact），供发布流程下载汇总。
#
# 产物命名（US-017 验收 5）：cx-<version>-arm64.pkg，清晰体现平台与版本。
#
# 安全约定：
#   - pkgbuild/productbuild 是 macOS 专有工具，必须在 macos runner 跑；本机（维护者）不参与打包。
#   - 渠道 token 只在「渲染成品配置」阶段经 Secret 注入；渲染前先 ::add-mask:: 登记为掩码，
#     打包日志绝不回显任何密钥（验收 6）。
#   - 成品配置（含 token）只藏在 .pkg 内部，绝不作为独立可下载资产上传（上传前守卫删除裸 config）。
name: package-macos

on:
  workflow_call:
    inputs:
      ref:
        description: "checkout 的 commit ref（取到 packaging/ 与 brand/ 脚本；应与编译产物同源基线）。"
        required: true
        type: string
      version:
        description: "定制版本号（形如 0.142.5-cx.1），用于产物命名与 pkg 元数据。"
        required: true
        type: string
      arch:
        description: "目标架构标签（arm64 / x86_64）。"
        required: false
        type: string
        default: arm64
      binary-artifact:
        description: "编译产物 artifact 名（内含裸 cx 二进制）。"
        required: false
        type: string
        default: release-aarch64-apple-darwin
      pkg-artifact:
        description: "输出 .pkg 的 artifact 名。"
        required: false
        type: string
        default: release-macos-pkg
    secrets:
      CX_BASE_URL:
        required: true
      CX_TOKEN:
        required: true
      CX_MODEL:
        required: true
      # 可选签名 / 公证：配置了才生效，否则产出未签名 .pkg。
      CX_SIGN_IDENTITY:
        required: false
      CX_NOTARIZE_PROFILE:
        required: false

permissions:
  contents: read

jobs:
  package:
    name: 构建 macOS .pkg
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout（取到 packaging/ 与 brand/ 脚本）
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 下载编译产物（裸 cx 二进制）
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.binary-artifact }}
          path: dist

      # render-config.sh 用了 declare -A（bash 4+），macOS 自带 /bin/bash 是 3.2。
      - name: 安装现代 bash（供 render-config.sh 使用）
        run: brew install bash

      - name: 渲染成品 config（占位符 → 真实渠道值，经 Secret 注入）
        env:
          CX_BASE_URL: ${{ secrets.CX_BASE_URL }}
          CX_TOKEN: ${{ secrets.CX_TOKEN }}
          CX_MODEL: ${{ secrets.CX_MODEL }}
        # 渲染前先把渠道值登记为 GitHub Actions 掩码：万一后续任何步骤意外回显，
        # 日志里也只会显示 ***，绝不出现明文 token/base_url（验收 6 的硬保证）。
        run: |
          set -euo pipefail
          for v in "$CX_TOKEN" "$CX_BASE_URL" "$CX_MODEL"; do
            [ -n "$v" ] && echo "::add-mask::$v"
          done
          bash scripts/render-config.sh dist/config.toml

      - name: 构建 .pkg（payload → /usr/local/bin/cx + postinstall 写 config）
        env:
          CX_VERSION: ${{ inputs.version }}
          CX_ARCH: ${{ inputs.arch }}
          # 可选签名/公证：配置了对应 Secret 才生效，否则产出未签名 .pkg。
          CX_SIGN_IDENTITY: ${{ secrets.CX_SIGN_IDENTITY }}
          CX_NOTARIZE_PROFILE: ${{ secrets.CX_NOTARIZE_PROFILE }}
        run: |
          set -euo pipefail
          chmod +x dist/cx
          bash packaging/macos/build-pkg.sh \
            --binary dist/cx \
            --config dist/config.toml \
            --version "$CX_VERSION" \
            --arch "$CX_ARCH" \
            --out "dist/cx-${CX_VERSION}-${CX_ARCH}.pkg"

      # 守卫（token 安全）：成品 config 含 token，只能存在于 .pkg 内部，
      # 绝不作为独立可下载资产上传。上传前显式核验：
      #   ① 确有 .pkg 产出；② 删除渲染出的裸 config.toml；③ 兜底断言其不存在。
      - name: 守卫：成品 config 不作独立资产（上传前移除裸 config）
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(dist/cx-*.pkg)
          [ "${#pkgs[@]}" -gt 0 ] || { echo "::error::未产出任何 .pkg，中止发布。" >&2; exit 1; }
          rm -f dist/config.toml
          if [ -e dist/config.toml ]; then
            echo "::error::dist/config.toml 仍存在，拒绝上传（防止 token 被当独立资产抓取）。" >&2
            exit 1
          fi
          echo "✓ 成品 config 已嵌入 .pkg，裸 config 已从待上传目录移除。"

      - name: 上传 .pkg 产物（仅 .pkg，显式排除任何裸 config）
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.pkg-artifact }}
          # 只匹配 .pkg；即便上一步遗漏，这里也不会捞到 config.toml。
          path: dist/cx-*.pkg
          if-no-files-found: error
